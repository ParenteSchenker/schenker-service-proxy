<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
  <title>Schenker Service Assistant</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    body { font-family: Segoe UI, sans-serif; font-size: 13px; margin: 0; padding: 14px; background: #faf9f8; }
    h2 { font-size: 14px; font-weight: 600; color: #0078d4; margin: 0 0 12px; }
    .info-box { background: #f3f2f1; border-radius: 4px; padding: 10px; font-size: 12px; line-height: 1.6; margin-bottom: 12px; color: #444; }
    .row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #edebe9; font-size: 12px; }
    .row:last-child { border-bottom: none; }
    .badge-ok   { background: #dff6dd; color: #107c10; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-miss { background: #fde7e9; color: #a4262c; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-par  { background: #fff4ce; color: #7a5e00; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .draft { background: #fff; border: 1px solid #edebe9; border-radius: 4px; padding: 10px; font-size: 12px; line-height: 1.7; white-space: pre-wrap; margin-top: 8px; }
    .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #605e5c; letter-spacing: 0.05em; margin: 12px 0 6px; }
    button { background: #0078d4; color: #fff; border: none; border-radius: 4px; padding: 8px 16px; font-size: 13px; cursor: pointer; width: 100%; margin-top: 4px; }
    button:hover { background: #106ebe; }
    button.sec { background: #fff; color: #0078d4; border: 1px solid #0078d4; margin-top: 6px; }
    button.sec:hover { background: #f3f9ff; }
    #status { font-size: 12px; color: #605e5c; margin: 8px 0; min-height: 18px; }
    #result { display: none; }
  </style>
</head>
<body>
  <h2>Schenker Service Assistant</h2>
  <div class="info-box">Seleziona un'email nella casella, poi clicca <strong>Analizza email</strong>.</div>
  <button onclick="analyzeEmail()">Analizza email selezionata</button>
  <div id="status"></div>
  <div id="result">
    <div class="section-title">Informazioni rilevate</div>
    <div id="info-rows"></div>
    <div id="action-section"></div>
    <button class="sec" onclick="copyDraft()">Copia bozza risposta</button>
    <button class="sec" onclick="replyWithDraft()">Apri risposta in Outlook</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
